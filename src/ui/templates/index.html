<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同修订智能体</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.95);
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 1.5rem;
            font-weight: 600;
        }

        .form-select, .form-control {
            border-radius: 10px;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .form-select:focus, .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .diff-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .diff-unchanged {
            padding: 0.5rem;
            color: #333;
        }

        .diff-deleted {
            background: #ffebee;
            color: #c62828;
            padding: 0.5rem;
            border-radius: 5px;
            margin: 0.25rem 0;
        }

        .diff-added {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 0.5rem;
            border-radius: 5px;
            margin: 0.25rem 0;
        }

        .suggestion-card {
            background: #fff;
            border-left: 4px solid #667eea;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .suggestion-type {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .reference-card {
            background: #fff;
            border-left: 4px solid #764ba2;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .reference-source {
            font-weight: 600;
            color: #764ba2;
            margin-bottom: 0.5rem;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .loading-spinner.show {
            display: block;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
        }

        .section-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #667eea;
        }

        .alert {
            border-radius: 10px;
            border: none;
        }

        .badge {
            font-weight: 500;
            padding: 0.5rem 1rem;
        }

        .original-text, .revised-text {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            margin-bottom: 1rem;
        }

        .text-label {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card">
                    <div class="card-header">
                        <h3 class="mb-0">
                            <i class="bi bi-file-text"></i> 合同修订智能体
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-4">
                            <label for="contractSelect" class="form-label">选择合同文件</label>
                            <select class="form-select" id="contractSelect">
                                <option value="">请选择合同文件...</option>
                            </select>
                        </div>

                        <div class="text-center">
                            <button class="btn btn-primary" id="processBtn" onclick="processContract()">
                                <i class="bi bi-gear"></i> 开始处理
                            </button>
                        </div>

                        <div class="loading-spinner" id="loadingSpinner">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                            <p class="mt-3">正在处理合同，请稍候...</p>
                        </div>

                        <div id="errorAlert" class="alert alert-danger mt-3" style="display: none;"></div>
                    </div>
                </div>

                <div id="resultsContainer" style="display: none;">
                    <div class="card">
                        <div class="card-header">
                            <h4 class="mb-0">
                                <i class="bi bi-pencil-square"></i> 修订结果
                            </h4>
                        </div>
                        <div class="card-body" id="resultsBody">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let contracts = [];
        let currentData = null;

        async function loadContracts() {
            try {
                const response = await fetch('/api/contracts');
                contracts = await response.json();
                
                const select = document.getElementById('contractSelect');
                select.innerHTML = '<option value="">请选择合同文件...</option>';
                
                contracts.forEach(contract => {
                    const option = document.createElement('option');
                    option.value = contract;
                    option.textContent = contract;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('加载合同列表失败:', error);
                showError('加载合同列表失败，请检查后端服务是否正常运行');
            }
        }

        async function processContract() {
            const contractSelect = document.getElementById('contractSelect');
            const filename = contractSelect.value;
            
            if (!filename) {
                showError('请选择合同文件');
                return;
            }

            const loadingSpinner = document.getElementById('loadingSpinner');
            const processBtn = document.getElementById('processBtn');
            const resultsContainer = document.getElementById('resultsContainer');
            const errorAlert = document.getElementById('errorAlert');

            loadingSpinner.classList.add('show');
            processBtn.disabled = true;
            resultsContainer.style.display = 'none';
            errorAlert.style.display = 'none';

            try {
                const response = await fetch('/api/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ filename: filename })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    currentData = data;
                    displayResults(data);
                } else {
                    showError(data.error || '处理失败');
                }
            } catch (error) {
                console.error('处理合同失败:', error);
                showError('处理合同失败，请检查网络连接');
            } finally {
                loadingSpinner.classList.remove('show');
                processBtn.disabled = false;
            }
        }

        function displayResults(data) {
            const resultsContainer = document.getElementById('resultsContainer');
            const resultsBody = document.getElementById('resultsBody');
            
            let html = '';

            if (data.suggestions && data.suggestions.length > 0) {
                html += `
                    <div class="fade-in" style="margin-bottom: 2rem;">
                        <h5 class="section-title">
                            <i class="bi bi-lightbulb"></i> 修改建议
                        </h5>
                        ${data.suggestions.map((suggestion, index) => `
                            <div class="suggestion-card">
                                <div class="suggestion-type">
                                    <i class="bi bi-geo-alt"></i> ${index + 1}. ${escapeHtml(suggestion.position.replace(/^\d+\.\s*/, '').replace('修改位置：', '').trim())}
                                </div>
                                <div style="margin-bottom: 1rem;">
                                    <strong>原文：</strong><br>
                                    <div style="background: #fff3cd; padding: 0.75rem; border-radius: 5px; margin-top: 0.5rem;">
                                        ${escapeHtml(suggestion.original)}
                                    </div>
                                </div>
                                <div style="margin-bottom: 1rem;">
                                    <strong>修改为：</strong><br>
                                    <div style="background: #d1e7dd; padding: 0.75rem; border-radius: 5px; margin-top: 0.5rem;">
                                        ${escapeHtml(suggestion.revised)}
                                    </div>
                                </div>
                                <div>
                                    <strong>修改原因：</strong><br>
                                    <div style="background: #cff4fc; padding: 0.75rem; border-radius: 5px; margin-top: 0.5rem;">
                                        ${escapeHtml(suggestion.reason)}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if (data.revised_contract) {
                html += `
                    <div class="fade-in" style="margin-bottom: 2rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <h5 class="section-title" style="margin: 0;">
                                <i class="bi bi-file-text"></i> 修订后的完整合同
                            </h5>
                            <button class="btn btn-success btn-sm" onclick="downloadWord()">
                                <i class="bi bi-download"></i> 下载
                            </button>
                        </div>
                        <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 10px; max-height: 600px; overflow-y: auto;">
                            <pre style="white-space: pre-wrap; word-wrap: break-word; margin: 0; font-family: inherit;">${escapeHtml(data.revised_contract)}</pre>
                        </div>
                    </div>
                `;
            }

            resultsBody.innerHTML = html;
            resultsContainer.style.display = 'block';
        }

        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
        }

        async function downloadWord() {
            if (!currentData || !currentData.revised_contract) {
                showError('没有可下载的修订合同内容');
                return;
            }

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        revised_contract: currentData.revised_contract,
                        filename: currentData.filename
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    
                    let downloadName = currentData.filename.replace('.txt', '');
                    downloadName = downloadName.replace(/\(revised\)$/i, '');
                    a.download = `${downloadName}(revised).docx`;
                    
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    const errorData = await response.json();
                    showError(errorData.error || '下载失败');
                }
            } catch (error) {
                console.error('下载失败:', error);
                showError('下载失败，请检查网络连接');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', loadContracts);
    </script>
</body>
</html>
