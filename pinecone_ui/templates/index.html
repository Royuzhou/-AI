<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinecone 向量数据库管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .status-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .status-indicator.connected {
            background: #10b981;
            color: white;
        }

        .status-indicator.disconnected {
            background: #ef4444;
            color: white;
        }

        .status-indicator.error {
            background: #f59e0b;
            color: white;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #374151;
            font-weight: 500;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .index-list {
            list-style: none;
        }

        .index-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .index-info {
            flex: 1;
        }

        .index-name {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .index-stats {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .index-actions {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.875rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
            border-radius: 12px;
            color: white;
        }

        .stat-label {
            font-size: 0.875rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #667eea;
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #9ca3af;
        }

        .close-btn:hover {
            color: #ef4444;
        }

        .file-upload {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: #f9fafb;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }

        .query-result {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .result-item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 3px solid #667eea;
        }

        .result-score {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .result-metadata {
            font-size: 0.875rem;
            color: #6b7280;
            font-family: monospace;
        }

        .config-section {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎯 Pinecone 向量数据库管理</h1>
            <p>直接连接 Pinecone 云服务，提供完整的知识库管理功能</p>
        </div>

        <!-- Connection Status -->
        <div class="status-card">
            <div id="connection-status" class="status-indicator">
                <span class="status-dot"></span>
                <span id="status-text">检查连接中...</span>
            </div>
            <button class="btn btn-primary" onclick="checkConnection()">
                🔄 刷新连接状态
            </button>
        </div>

        <!-- Main Grid -->
        <div class="grid">
            <!-- Indexes Card -->
            <div class="card">
                <h2>📚 索引管理</h2>
                <button class="btn btn-primary" onclick="showCreateIndexModal()" style="margin-bottom: 20px;">
                    ➕ 创建新索引
                </button>
                <ul id="index-list" class="index-list">
                    <li style="text-align: center; color: #9ca3af; padding: 20px;">
                        加载中...
                    </li>
                </ul>
            </div>

            <!-- Upload Card -->
            <div class="card">
                <h2>📤 文件上传</h2>
                <div class="file-upload" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" onchange="handleFileUpload(event)">
                    <div style="font-size: 3rem; margin-bottom: 10px;">📁</div>
                    <p style="color: #6b7280;">点击或拖拽文件到此处</p>
                    <p style="font-size: 0.875rem; color: #9ca3af; margin-top: 5px;">
                        支持 PDF, DOCX, TXT 等格式
                    </p>
                </div>
                <div id="upload-status" style="margin-top: 15px;"></div>
            </div>

            <!-- Query Card -->
            <div class="card">
                <h2>🔍 向量查询</h2>
                <div class="input-group">
                    <label>选择索引</label>
                    <select id="query-index-select">
                        <option value="">请先选择索引</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>查询向量 (JSON 数组)</label>
                    <textarea id="query-vector" 
                              placeholder='[0.1, 0.2, 0.3, ...]'
                              style="width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-family: monospace;"
                              rows="4"></textarea>
                </div>
                <div class="input-group">
                    <label>返回数量 (top_k)</label>
                    <input type="number" id="query-top-k" value="10" min="1" max="100">
                </div>
                <button class="btn btn-primary" onclick="performQuery()">
                    🔍 查询
                </button>
                <div id="query-result"></div>
            </div>
        </div>

        <!-- Configuration Card -->
        <div class="card">
            <h2>⚙️ 配置管理</h2>
            <div class="config-section">
                <h3 style="margin-bottom: 15px;">Pinecone 配置</h3>
                <div class="config-row">
                    <div class="input-group">
                        <label>API Key</label>
                        <input type="password" id="config-api-key" placeholder="pcsk_xxx">
                    </div>
                    <div class="input-group">
                        <label>索引名称</label>
                        <input type="text" id="config-index-name" placeholder="legal-knowledge-base">
                    </div>
                </div>
                <div class="config-row">
                    <div class="input-group">
                        <label>向量维度</label>
                        <input type="number" id="config-dimension" value="768">
                    </div>
                    <div class="input-group">
                        <label>度量方式</label>
                        <select id="config-metric">
                            <option value="cosine">cosine</option>
                            <option value="dotproduct">dotproduct</option>
                            <option value="euclidean">euclidean</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-success" onclick="saveConfig()">
                    💾 保存配置
                </button>
            </div>
        </div>
    </div>

    <!-- Create Index Modal -->
    <div id="create-index-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>创建新索引</h2>
                <button class="close-btn" onclick="closeModal('create-index-modal')">×</button>
            </div>
            <div class="input-group">
                <label>索引名称</label>
                <input type="text" id="new-index-name" placeholder="my-index">
            </div>
            <div class="input-group">
                <label>向量维度</label>
                <input type="number" id="new-index-dimension" value="768">
            </div>
            <div class="input-group">
                <label>度量方式</label>
                <select id="new-index-metric">
                    <option value="cosine">cosine</option>
                    <option value="dotproduct">dotproduct</option>
                    <option value="euclidean">euclidean</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="createIndex()" style="flex: 1;">
                    创建
                </button>
                <button class="btn btn-secondary" onclick="closeModal('create-index-modal')" style="flex: 1;">
                    取消
                </button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let currentIndexes = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkConnection();
            loadConfig();
        });

        // API calls
        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(endpoint, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || data.message || '请求失败');
                }
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // Check connection
        async function checkConnection() {
            const statusEl = document.getElementById('connection-status');
            const statusText = document.getElementById('status-text');
            
            try {
                const data = await apiCall('/api/connection/status');
                
                statusEl.className = `status-indicator ${data.status}`;
                statusText.textContent = data.message;
                
                if (data.status === 'connected') {
                    currentIndexes = data.indexes || [];
                    renderIndexList();
                    updateIndexSelect();
                }
            } catch (error) {
                statusEl.className = 'status-indicator error';
                statusText.textContent = `连接失败：${error.message}`;
            }
        }

        // Render index list
        function renderIndexList() {
            const listEl = document.getElementById('index-list');
            
            if (currentIndexes.length === 0) {
                listEl.innerHTML = '<li style="text-align: center; color: #9ca3af; padding: 20px;">暂无索引</li>';
                return;
            }
            
            listEl.innerHTML = currentIndexes.map(name => {
                const stats = window.indexStats?.[name] || {};
                const vectorCount = stats.total_vector_count || 0;
                const dimension = stats.dimension || '?';
                
                return `
                    <li class="index-item">
                        <div class="index-info">
                            <div class="index-name">${name}</div>
                            <div class="index-stats">
                                维度：${dimension} | 向量数：${vectorCount.toLocaleString()}
                            </div>
                        </div>
                        <div class="index-actions">
                            <button class="btn btn-danger btn-sm" onclick="deleteIndex('${name}')">
                                删除
                            </button>
                        </div>
                    </li>
                `;
            }).join('');
        }

        // Update index select dropdown
        function updateIndexSelect() {
            const selectEl = document.getElementById('query-index-select');
            selectEl.innerHTML = currentIndexes.map(name => 
                `<option value="${name}">${name}</option>`
            ).join('');
            
            if (currentIndexes.length === 0) {
                selectEl.innerHTML = '<option value="">没有可用索引</option>';
            }
        }

        // Create index
        function showCreateIndexModal() {
            document.getElementById('create-index-modal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        async function createIndex() {
            const name = document.getElementById('new-index-name').value.trim();
            const dimension = parseInt(document.getElementById('new-index-dimension').value);
            const metric = document.getElementById('new-index-metric').value;
            
            if (!name) {
                alert('请输入索引名称');
                return;
            }
            
            try {
                await apiCall('/api/indexes/create', {
                    method: 'POST',
                    body: JSON.stringify({ name, dimension, metric })
                });
                
                closeModal('create-index-modal');
                document.getElementById('new-index-name').value = '';
                await checkConnection();
                
                showAlert('success', `索引 "${name}" 创建成功`);
            } catch (error) {
                showAlert('error', `创建失败：${error.message}`);
            }
        }

        // Delete index
        async function deleteIndex(name) {
            if (!confirm(`确定要删除索引 "${name}" 吗？此操作不可恢复！`)) {
                return;
            }
            
            try {
                await apiCall(`/api/indexes/${name}/delete`, {
                    method: 'DELETE'
                });
                
                await checkConnection();
                showAlert('success', `索引 "${name}" 删除成功`);
            } catch (error) {
                showAlert('error', `删除失败：${error.message}`);
            }
        }

        // File upload
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            const statusEl = document.getElementById('upload-status');
            statusEl.innerHTML = '<div class="alert alert-warning">上传中...</div>';
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || '上传失败');
                }
                
                statusEl.innerHTML = `
                    <div class="alert alert-success">
                        ✅ 文件上传成功：<strong>${data.filename}</strong>
                    </div>
                `;
            } catch (error) {
                statusEl.innerHTML = `
                    <div class="alert alert-error">
                        ❌ 上传失败：${error.message}
                    </div>
                `;
            }
        }

        // Perform query
        async function performQuery() {
            const indexName = document.getElementById('query-index-select').value;
            const vectorStr = document.getElementById('query-vector').value.trim();
            const topK = parseInt(document.getElementById('query-top-k').value);
            
            if (!indexName) {
                showAlert('warning', '请先选择一个索引', 'query-result');
                return;
            }
            
            let vector;
            try {
                vector = JSON.parse(vectorStr);
                if (!Array.isArray(vector)) {
                    throw new Error('向量必须是数组格式');
                }
            } catch (error) {
                showAlert('error', `向量格式错误：${error.message}`, 'query-result');
                return;
            }
            
            const resultEl = document.getElementById('query-result');
            resultEl.innerHTML = '<div class="loading"></div>';
            
            try {
                const data = await apiCall('/api/query', {
                    method: 'POST',
                    body: JSON.stringify({
                        index_name: indexName,
                        vector: vector,
                        top_k: topK,
                        include_metadata: true
                    })
                });
                
                if (!data.matches || data.matches.length === 0) {
                    resultEl.innerHTML = '<div class="alert alert-warning">未找到匹配的向量</div>';
                    return;
                }
                
                resultEl.innerHTML = `
                    <div class="query-result">
                        <h4 style="margin-bottom: 10px;">查询结果 (${data.matches.length} 条)</h4>
                        ${data.matches.map((match, i) => `
                            <div class="result-item">
                                <div class="result-score">相似度：${match.score?.toFixed(4) || 'N/A'}</div>
                                <div class="result-metadata">ID: ${match.id}</div>
                                ${match.metadata ? `<div class="result-metadata">${JSON.stringify(match.metadata)}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                resultEl.innerHTML = `<div class="alert alert-error">查询失败：${error.message}</div>`;
            }
        }

        // Load config
        async function loadConfig() {
            try {
                const config = await apiCall('/api/config');
                
                if (config.pinecone) {
                    document.getElementById('config-api-key').value = config.pinecone.api_key || '';
                    document.getElementById('config-index-name').value = config.pinecone.index_name || '';
                    document.getElementById('config-dimension').value = config.pinecone.dimension || 768;
                    document.getElementById('config-metric').value = config.pinecone.metric || 'cosine';
                }
            } catch (error) {
                console.error('加载配置失败:', error);
            }
        }

        // Save config
        async function saveConfig() {
            const config = {
                api_key: document.getElementById('config-api-key').value.trim(),
                index_name: document.getElementById('config-index-name').value.trim(),
                dimension: parseInt(document.getElementById('config-dimension').value),
                metric: document.getElementById('config-metric').value
            };
            
            if (!config.api_key) {
                showAlert('error', 'API Key 不能为空');
                return;
            }
            
            try {
                await apiCall('/api/config', {
                    method: 'POST',
                    body: JSON.stringify(config)
                });
                
                showAlert('success', '配置保存成功，正在重新连接...');
                setTimeout(() => checkConnection(), 1000);
            } catch (error) {
                showAlert('error', `保存失败：${error.message}`);
            }
        }

        // Show alert helper
        function showAlert(type, message, containerId = null) {
            const alertHtml = `
                <div class="alert alert-${type}">
                    ${type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️'} ${message}
                </div>
            `;
            
            if (containerId) {
                document.getElementById(containerId).innerHTML = alertHtml;
            } else {
                // Show as notification (simplified)
                alert(message);
            }
        }
    </script>
</body>
</html>
