<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 Pinecone API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Pinecone API 测试</h1>
    
    <button onclick="testListIndexes()">测试列出索引</button>
    <button onclick="testConfig()">测试获取配置</button>
    
    <div id="results"></div>

    <script>
        async function testListIndexes() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="result">加载中...</div>';
            
            try {
                const response = await fetch('/api/kb/pinecone/indexes');
                const data = await response.json();
                
                if (response.ok) {
                    resultsDiv.innerHTML = `
                        <div class="result success">
                            <h3>✓ 成功!</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="result error">
                            <h3>✗ 错误 (${response.status})</h3>
                            <p>${data.error || '未知错误'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="result error">
                        <h3>✗ 请求失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testConfig() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="result">加载中...</div>';
            
            try {
                const response = await fetch('/api/kb/config');
                const data = await response.json();
                
                resultsDiv.innerHTML = `
                    <div class="result success">
                        <h3>✓ 配置加载成功!</h3>
                        <p><strong>Pinecone API Key:</strong> ${data.pinecone?.api_key ? '已配置' : '未配置'}</p>
                        <p><strong>Index Name:</strong> ${data.pinecone?.index_name || 'N/A'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="result error">
                        <h3>✗ 请求失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
