# servers/corpus/parameter.yaml
# 已修改为使用实际存在的测试文件
parse_file_path: data/test_contract.docx
text_corpus_save_path: data/knowledge_base/corpus/test_corpus.jsonl
image_corpus_save_path: corpora/image.jsonl

# mineru
mineru_dir: corpora/
mineru_extra_params:
  source: modelscope

# chunking parameters
raw_chunk_path: data/knowledge_base/chunks/test_raw.jsonl
chunk_path: data/knowledge_base/chunks/test_final.jsonl
use_title: false
chunk_backend: sentence # choices=["token", "sentence", "recursive"]
tokenizer_or_token_counter: character
chunk_size: 512
chunk_backend_configs:
  token:
    chunk_overlap: 50
  sentence:
    chunk_overlap: 50
    min_sentences_per_chunk: 1
    delim: "['.', '!', '?', '；', '。', '！', '？', '\\n']"
  recursive:
    min_characters_per_chunk: 12