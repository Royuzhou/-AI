# UltraRAG 本地知识库配置 - 使用 FAISS 向量数据库
# 此配置无需 Docker 或云服务，完全本地运行

# MCP 服务器
servers:
  corpus: D:/华南理工大学/软件工程概论/contract_revision_agent/UltraRAG/servers/corpus
  retriever: D:/华南理工大学/软件工程概论/contract_revision_agent/UltraRAG/servers/retriever

# 知识库配置
knowledge_base:
  # 使用本地 FAISS 向量索引
  vector_backend: faiss
  # 语料库路径
  corpus_path: ./data/knowledge_base/corpus
  # 分块路径
  chunks_path: ./data/knowledge_base/chunks
  # 原始文件路径
  raw_path: ./data/knowledge_base/raw
  # FAISS 索引路径
  faiss_index_path: ./data/knowledge_base/faiss_index

# MCP 客户端管道
pipeline:
  # 1. 构建文本语料库
  - corpus.build_text_corpus
  # 2. 文档分块
  - corpus.corpus_chunk
  # 3. 创建 FAISS 向量索引
  - retriever.retriever_init
  - retriever.retriever_index
