# UltraRAG 复杂 RAG 迭代配置 - TAML 格式
# 支持多轮检索、重排序、迭代优化的完整 RAG 流程

# ==================== MCP 服务器定义 ====================
servers:
  corpus: D:/华南理工大学/软件工程概论/contract_revision_agent/UltraRAG/servers/corpus          # 语料处理服务
  retriever: D:/华南理工大学/软件工程概论/contract_revision_agent/UltraRAG/servers/retriever    # 检索服务
  reranker: D:/华南理工大学/软件工程概论/contract_revision_agent/UltraRAG/servers/reranker      # 重排序服务
  generation: D:/华南理工大学/软件工程概论/contract_revision_agent/UltraRAG/servers/generation  # 生成服务
  evaluation: D:/华南理工大学/软件工程概论/contract_revision_agent/UltraRAG/servers/evaluation  # 评估服务

# ==================== 处理流水线 ====================
# 定义完整的 RAG 迭代流程
pipeline:
  # Phase 1: 知识库构建
  - name: "build_knowledge_base"
    steps:
      - corpus.build_text_corpus    # 解析文档
      - corpus.chunk_documents       # 文档分块
      - retriever.retriever_init     # 初始化检索器
      - retriever.retriever_index    # 构建向量索引
  
  # Phase 2: 迭代检索与优化
  - name: "iterative_retrieval"
    iterations: 3  # 迭代 3 次
    steps:
      - retriever.retriever_search   # 初始检索
      - reranker.rerank_documents    # 重排序
      - evaluation.evaluate_retrieval # 评估检索质量
      - generation.generate_query_rewrite # 优化查询
  
  # Phase 3: 答案生成
  - name: "answer_generation"
    steps:
      - generation.generate_response  # 生成最终答案
      - evaluation.evaluate_answer    # 评估答案质量

# ==================== 参数配置 ====================
parameters:
  # --- 语料处理参数 ---
  parse_file_path: data/knowledge_base/raw/upload_20260312_175643_2cb6ef17/中华人民共和国民法典_20200528.docx
  text_corpus_save_path: data/knowledge_base/corpus/legal_corpus.jsonl
  image_corpus_save_path: data/knowledge_base/corpus/legal_image.jsonl
  
  # --- 分块参数 ---
  raw_chunk_path: data/knowledge_base/chunks/legal_raw.jsonl
  chunk_path: data/knowledge_base/chunks/legal_final.jsonl
  use_title: true  # 使用标题信息
  chunk_backend: sentence
  chunk_size: 512
  chunk_overlap: 50
  chunk_backend_configs:
    sentence:
      min_sentences_per_chunk: 1
      delim: "['.', '!', '?', '；', '。', '！', '？', '\\n']"
  
  # --- 检索参数 ---
  collection_name: legal_knowledge_base
  search_top_k: 10  # 初始检索返回数量
  search_score_threshold: 0.5  # 分数阈值
  
  # --- 重排序参数 ---
  rerank_top_k: 5  # 重排序后保留数量
  rerank_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  
  # --- 迭代优化参数 ---
  max_iterations: 3
  convergence_threshold: 0.8  # 收敛阈值
  query_rewrite_strategy: "expansion"  # 查询扩展策略
  
  # --- 生成参数 ---
  generator_model: "Qwen/Qwen2.5-7B-Instruct"
  max_tokens: 2048
  temperature: 0.7
  
  # --- 评估参数 ---
  evaluation_metrics: ["precision", "recall", "f1", "ndcg"]
  answer_quality_threshold: 0.75

# ==================== 服务器配置映射 ====================
# 注意：UltraRAG v0.3.0 要求 server_configs 指向独立文件
# 这里我们直接引用已有的服务器配置文件
server_configs: examples/server/complex_rag_server.yaml

# ==================== 迭代控制逻辑 ====================
iteration_control:
  # 收敛条件判断
  convergence:
    type: "score_improvement"
    threshold: $convergence_threshold
    max_iterations: $max_iterations
  
  # 每轮迭代的处理逻辑
  per_iteration:
    before_search:
      - log: "Starting iteration {iteration_number}"
      - update_query: "${rewritten_query}"
    
    after_rerank:
      - check_convergence: true
      - if_not_converged:
          - generate_feedback: "检索质量未达标，继续优化"
          - rewrite_query: true
    
    after_generation:
      - evaluate_quality: true
      - if_low_quality:
          - increase_context: true
          - retry_generation: 1

# ==================== 日志与监控 ====================
logging:
  level: INFO
  save_dir: output/rag_iterations
  metrics_log: true
  visualization: true

# ==================== 缓存策略 ====================
cache:
  enabled: true
  cache_dir: .cache/ultrarag
  ttl_hours: 24
  cache_keys:
    - "retrieved_docs"
    - "reranked_docs"
    - "generated_answer"
